name: CI/CD Docker

on:
  push:
    branches:
      - main

jobs:
  build-push-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-full-project:${{ github.sha }} .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-full-project:${{ github.sha }}

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/devops-app devops-app=${{ secrets.DOCKER_USERNAME }}/devops-full-project:${{ github.sha }}
          kubectl rollout status deployment/devops-app
